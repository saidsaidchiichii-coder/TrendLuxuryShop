<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendLuxuryShop</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <h1>TrendLuxuryShop</h1>
  <p>AI-powered Luxury Shopping Experience</p>
</header>

<section class="hero">
  <h2>Find Trending Products with AI</h2>

  <div class="ai-box">
    <input id="msg" placeholder="Ask AI about any product..." />
    <button onclick="sendMessage()">Ask AI</button>
  </div>

  <div id="response"></div>
</section>

<section class="products">

  <div class="card">
    <h3>Smart Watch</h3>
    <p>Fitness + health tracking AI-ready device</p>
    <button onclick="askAI('Smart Watch review')">Ask AI</button>
  </div>

  <div class="card">
    <h3>Wireless Headphones</h3>
    <p>Premium bass & noise cancellation</p>
    <button onclick="askAI('Headphones review')">Ask AI</button>
  </div>

  <div class="card">
    <h3>Gaming Setup</h3>
    <p>Full pro setup for gamers & creators</p>
    <button onclick="askAI('Gaming setup ideas')">Ask AI</button>
  </div>

</section>

<footer>
  <p>© 2026 TrendLuxuryShop</p>
</footer>

<script src="script.js"></script>
</body>
</html>

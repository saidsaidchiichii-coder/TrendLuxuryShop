<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendLuxuryShop</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>TrendLuxuryShop</h1>
    <p>Smart AI-powered Shopping Experience</p>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h2>Find the best trending products with AI</h2>
    <input id="msg" placeholder="Ask AI about any product...">
    <button onclick="sendMessage()">Ask AI</button>
    <p id="response"></p>
  </section>

  <!-- PRODUCTS -->
  <section class="products">

    <div class="card">
      <h3>Smart Watch</h3>
      <p>Track fitness & health</p>
      <button onclick="askAI('Tell me about smart watches')">
        Ask AI
      </button>
    </div>

    <div class="card">
      <h3>Wireless Headphones</h3>
      <p>High quality sound</p>
      <button onclick="askAI('Are these headphones good?')">
        Ask AI
      </button>
    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 TrendLuxuryShop</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>

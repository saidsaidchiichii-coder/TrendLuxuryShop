  <style>
    /* CINEMATIC CSS - COMPLETE PRODUCTION READY */
    * {

      overflow-x: hidden;
      height: 100%;

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #ffffff;
      line-height: 1.5;
      overflow-x: hidden;
      perspective: 1200px;
      perspective-origin: center center;
      transform-style: preserve-3d;
      height: 100vh;

    /* GLOBAL VARIABLES */
    :root {
      --neon-green: #00ff88;
      --neon-blue: #3aa0ff;
      --neon-purple: #8b5cf6;
      --dark-bg: #0a0a0f;
      --glass-bg: rgba(255,255,255,0.05);
      --glass-border: rgba(0,255,136,0.3);
      --glow-green: 0 0 30px rgba(0,255,136,0.6);
      --glow-blue: 0 0 30px rgba(58,160,255,0.6);
      --shadow-3d: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    /* LOADING SCREEN */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--dark-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 1s ease-out;
    }

    .logo-spin {
      font-size: 4rem;
      animation: logoSpin 2s cubic-bezier(0.23,1,0.32,1) infinite;
    }

    @keyframes logoSpin {
      0%, 100% { transform: rotateY(0deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.2); }
    }

    /* PARTICLES SYSTEM */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(45deg, var(--neon-green), var(--neon-blue));
      animation: particleFloat linear infinite;
      box-shadow: var(--glow-green);
    }

    @keyframes particleFloat {
      0% {

        opacity: 0;
      }
      10% { opacity: 1; transform: translateY(90vh) translateX(10%) rotate(90deg) scale(1); }
      90% { opacity: 1; transform: translateY(10vh) translateX(-10%) rotate(270deg) scale(1); }
